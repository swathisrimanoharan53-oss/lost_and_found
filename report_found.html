<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Found Item</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="report-found-bg">

<div class="report-container">

    <h2>📦 Report Found Item</h2>

    <form method="POST" enctype="multipart/form-data">

        <input type="text" name="owner_name" placeholder="Your Name" required>

        <input type="text" name="contact" placeholder="Contact Number" required>

        <input type="text" name="item_name" placeholder="Item Name" required>

        <input type="text" name="category" placeholder="Category (Wallet, Phone, etc.)" required>

        <textarea name="description" placeholder="Description" required></textarea>

        <input type="date" name="date_found" required>

        <input type="text" name="location" placeholder="Where Found?" required>

        <select name="status" required>
            <option value="Found">Found</option>
            <option value="Pending">Pending</option>
        </select>

        <input type="file" name="image" accept="image/*">

        <button type="submit">Submit</button>

    </form>

    <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back to Dashboard</a>

</div>

</body>
</html>
