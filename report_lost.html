<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Lost Item</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="report-lost-bg">

<div class="report-container lost">
    <h2 class="form-title">🚨 Report a Lost Item</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="owner_name" placeholder="Owner Name" required>
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="text" name="item_name" placeholder="Item Name" required>
        <input type="text" name="category" placeholder="Category (e.g. Wallet, Phone)" required>
        <textarea name="description" placeholder="Brief Description" required></textarea>
        <input type="date" name="date_lost" required>
        <input type="text" name="location" placeholder="Where Lost?" required>
        <select name="status" required>
            <option value="Lost">Lost</option>
            <option value="Pending">Pending</option>
        </select>
        <input type="file" name="image" accept="image/*">
        <button type="submit">Report Now</button>
    </form>
    <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back to Dashboard</a>
</div>

</body>
</html>
