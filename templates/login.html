<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Lost & Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            padding: 50px 70px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }
        .login-container h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 30px;
        }
        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .login-container input:focus {
            border-color: #66a6ff;
            box-shadow: 0 0 10px rgba(102,166,255,0.5);
        }
        .login-container button {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            border: none;
            color: white;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(255,126,179,0.4);
        }
        .login-container button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255,126,179,0.5);
        }
        .register-link {
            margin-top: 15px;
            display: block;
            color: #66a6ff;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: red;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Lost & Found Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- 🔥 ADD THIS (for error messages) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p class="error-msg">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

        <a class="register-link" href="{{ url_for('register') }}">New User? Register</a>
    </div>
</body>
</html>
