<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Lost Items | Lost & Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="view-container">
        <h2 class="view-title">Lost Items</h2>
        <table>
            <tr>
                <th>Item Name</th>
                <th>Description</th>
                <th>Date Lost</th>
                <th>Location</th>
            </tr>
            {% for item in items %}
            <tr>
                <td>{{ item.item_name }}</td>
                <td>{{ item.description }}</td>
                <td>{{ item.date_lost }}</td>
                <td>{{ item.location }}</td>
            </tr>
            {% endfor %}
        </table>
        <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back to Dashboard</a>
    </div>
</body>
</html>
